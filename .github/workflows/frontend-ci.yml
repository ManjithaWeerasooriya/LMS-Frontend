name: Frontend CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  NEXT_TELEMETRY_DISABLED: 1
  RUN_SELENIUM: ${{ vars.RUN_SELENIUM || 'false' }}
  E2E_BASE_URL: ${{ vars.E2E_BASE_URL || '' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm run test -- --run

      - name: Coverage report
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Selenium E2E (optional)
        if: env.RUN_SELENIUM == 'true'
        run: npm run test:e2e
        env:
          INSTRUCTOR_EMAIL: ${{ secrets.INSTRUCTOR_EMAIL }}
          INSTRUCTOR_PASSWORD: ${{ secrets.INSTRUCTOR_PASSWORD }}
          STUDENT_EMAIL: ${{ secrets.STUDENT_EMAIL }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
